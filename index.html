<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SeM – Acquisti</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
#app-area { display: none; }
#settings-menu { display:none; margin-top:10px; }
button { margin:5px; padding:10px; }
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login-area">
  <h2>Login</h2>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app-area">

  <h2>Gestione Spese</h2>

  <!-- Pulsante ingranaggio -->
  <button id="settings-btn" onclick="toggleSettings()">⚙️</button>

  <!-- Menu impostazioni -->
  <div id="settings-menu">
    <button onclick="esporta()">Esporta dati</button>
    <button onclick="backup()">Backup</button>
  </div>

  <!-- Filtri -->
  <h3>Filtri</h3>
  <select id="mese">
    <option value="1">Gennaio</option>
    <option value="2">Febbraio</option>
    <option value="3">Marzo</option>
    <option value="4">Aprile</option>
    <option value="5">Maggio</option>
    <option value="6">Giugno</option>
    <option value="7">Luglio</option>
    <option value="8">Agosto</option>
    <option value="9">Settembre</option>
    <option value="10">Ottobre</option>
    <option value="11">Novembre</option>
    <option value="12">Dicembre</option>
  </select>

  <input id="anno" type="number" value="2024">

  <button onclick="aggiorna()">Visualizza spese</button>
  <button onclick="mostraSpeseMeseCorrente()">Mostra spese mese corrente</button>

  <hr>

  <!-- Aggiunta spesa -->
  <h3>Aggiungi Spesa</h3>
  <input id="motivazione" placeholder="Motivo" value="Spesa">
  <input id="importo" type="number" step="0.01" placeholder="€" value="0">
  <button onclick="aggiungi()">Aggiungi</button>

  <hr>

  <!-- Lista spese -->
  <h3>Spese</h3>
  <ul id="lista"></ul>

  <h3 id="totale">Totale: € 0</h3>

</div>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(err => alert(err.message));
}

// MOSTRA APP DOPO LOGIN
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("login-area").style.display = "none";
    document.getElementById("app-area").style.display = "block";

    impostaMeseCorrente();
    aggiorna();
  } else {
    document.getElementById("login-area").style.display = "block";
    document.getElementById("app-area").style.display = "none";
  }
});

// IMPOSTA MESE CORRENTE
function impostaMeseCorrente() {
  const oggi = new Date();
  document.getElementById("mese").value = oggi.getMonth() + 1;
  document.getElementById("anno").value = oggi.getFullYear();
}

// AGGIUNGI SPESA
function aggiungi() {
  if (!motivazione.value || !importo.value) return;

  db.collection("spese").add({
    motivazione: motivazione.value,
    importo: parseFloat(importo.value),
    timestamp: Date.now()
  });

  motivazione.value = "Spesa";
  importo.value = "0";

  aggiorna();
}

// MOSTRA SPESE MESE CORRENTE
function mostraSpeseMeseCorrente() {
  impostaMeseCorrente();
  aggiorna();
}

// AGGIORNA LISTA
function aggiorna() {
  const mese = parseInt(document.getElementById("mese").value);
  const anno = parseInt(document.getElementById("anno").value);

  db.collection("spese").orderBy("timestamp", "desc").get().then(snapshot => {
    let html = "";
    let totale = 0;

    snapshot.forEach(doc => {
      const s = doc.data();
      const d = new Date(s.timestamp);

      if (d.getMonth() + 1 === mese && d.getFullYear() === anno) {
        html += `<li>${s.motivazione} - € ${s.importo.toFixed(2)}</li>`;
        totale += s.importo;
      }
    });

    document.getElementById("lista").innerHTML = html;
    document.getElementById("totale").innerText = "Totale: € " + totale.toFixed(2);
  });
}

// MENU INGRANAGGIO
function toggleSettings() {
  const menu = document.getElementById("settings-menu");
  menu.style.display = (menu.style.display === "none") ? "block" : "none";
}

// ESPORTA
function esporta() {
  alert("Funzione esporta in sviluppo");
}

// BACKUP
function backup() {
  alert("Funzione backup in sviluppo");
}

</script>

</body>
</html>
